[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/playwright-browsers"

[phases.setup]
pkgs = [
    "glib", "nss", "nspr", "atk", "at-spi2-atk", "dbus", "cups", 
    "libdrm", "gtk3", "libxkbcommon", "mesa", "alsa-lib", 
    "expat", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", 
    "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", 
    "xorg.libxcb", "xorg.libXcursor", "xorg.libXi", "xorg.libXtst", 
    "xorg.libXrender", "xorg.libXScrnSaver"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "PLAYWRIGHT_BROWSERS_PATH=/app/playwright-browsers playwright install --with-deps chromium"
]
