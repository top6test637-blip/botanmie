[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/playwright-browsers"

[phases.setup]
pkgs = [
    "libgbm", "libxkbcommon", "libXcomposite", "libXdamage", "libXext", 
    "libXfixes", "libXrandr", "libxcb", "expat", "pango", 
    "cairo", "alsa-lib"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "PLAYWRIGHT_BROWSERS_PATH=/app/playwright-browsers playwright install --with-deps chromium"
]
